<html>

  <head>
    <script type="text/javascript" src="http://code.jquery.com/jquery-latest.js"></script>
    <script type="text/javascript" src="data/OverviewText.js"></script>
    <script>
    function loadEntryHolderPage() {
      var entryImages = "";
      var entryImageLink = "";
      for (i = 494; i <= 649; i++) {
        entryImageLink = "https://assets.pokemon.com/assets/cms2/img/pokedex/full/".concat(overviewNum[i],".png");
        entryImages = entryImages + "<a href='entryPages/entryPage_" + i + ".html'><img src='" + entryImageLink + "' width='40' height='40'></a>";
      }
      document.getElementById("entryHolder").innerHTML = entryImages;
    }
    </script>
  </head>

  <body onload="loadEntryHolderPage()">
    <div id ="entryHolder"></div>
  </body>

</html>
